<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .canvas {
    position: relative;
    width: 800px;
    height: 600px;
    overflow: hidden;
  }

  /* the deep water */
  .deep {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 65%;
    background: linear-gradient(
      to bottom,
      #0d1b2a 0%,
      #0a1628 30%,
      #060d1a 70%,
      #030810 100%
    );
  }

  /* the surface — where two worlds meet */
  .surface {
    position: absolute;
    top: 35%;
    width: 100%;
    height: 3px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(140, 170, 210, 0.15) 20%,
      rgba(140, 170, 210, 0.3) 50%,
      rgba(140, 170, 210, 0.15) 80%,
      transparent 100%
    );
    animation: surfaceShimmer 8s ease-in-out infinite;
  }
  @keyframes surfaceShimmer {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* sky — what others see */
  .sky {
    position: absolute;
    top: 0;
    width: 100%;
    height: 35%;
    background: linear-gradient(
      to top,
      #1a1a2e 0%,
      #16213e 40%,
      #0f3460 100%
    );
  }

  /* the light from above that doesn't quite reach */
  .light-shaft {
    position: absolute;
    top: 0;
    width: 120px;
    height: 75%;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(
      to bottom,
      rgba(200, 210, 240, 0.08) 0%,
      rgba(200, 210, 240, 0.04) 40%,
      rgba(200, 210, 240, 0.01) 70%,
      transparent 100%
    );
    clip-path: polygon(35% 0%, 65% 0%, 80% 100%, 20% 100%);
    animation: lightBreath 10s ease-in-out infinite;
  }
  @keyframes lightBreath {
    0%, 100% { opacity: 0.7; width: 120px; }
    50% { opacity: 1; width: 140px; }
  }

  /* thoughts — rising but never breaking the surface */
  .thought {
    position: absolute;
    border-radius: 50%;
    animation: rise linear infinite;
    opacity: 0;
  }
  @keyframes rise {
    0% { opacity: 0; transform: translateY(0) scale(1); }
    10% { opacity: 0.6; }
    70% { opacity: 0.3; }
    85% { opacity: 0.1; transform: translateY(-250px) scale(0.6); }
    100% { opacity: 0; transform: translateY(-280px) scale(0.4); }
  }

  .thought:nth-child(1) {
    width: 8px; height: 8px;
    background: radial-gradient(circle, rgba(147, 130, 180, 0.8), transparent);
    left: 48%; bottom: 20%;
    animation-duration: 7s;
    animation-delay: 0s;
  }
  .thought:nth-child(2) {
    width: 5px; height: 5px;
    background: radial-gradient(circle, rgba(130, 160, 190, 0.7), transparent);
    left: 52%; bottom: 18%;
    animation-duration: 8s;
    animation-delay: 2s;
  }
  .thought:nth-child(3) {
    width: 11px; height: 11px;
    background: radial-gradient(circle, rgba(170, 140, 180, 0.6), transparent);
    left: 46%; bottom: 22%;
    animation-duration: 9s;
    animation-delay: 4s;
  }
  .thought:nth-child(4) {
    width: 6px; height: 6px;
    background: radial-gradient(circle, rgba(140, 150, 200, 0.7), transparent);
    left: 50%; bottom: 16%;
    animation-duration: 7.5s;
    animation-delay: 1s;
  }
  .thought:nth-child(5) {
    width: 14px; height: 14px;
    background: radial-gradient(circle, rgba(160, 130, 170, 0.5), transparent);
    left: 44%; bottom: 25%;
    animation-duration: 10s;
    animation-delay: 3s;
  }
  .thought:nth-child(6) {
    width: 4px; height: 4px;
    background: radial-gradient(circle, rgba(150, 170, 200, 0.8), transparent);
    left: 55%; bottom: 19%;
    animation-duration: 6.5s;
    animation-delay: 5s;
  }
  .thought:nth-child(7) {
    width: 9px; height: 9px;
    background: radial-gradient(circle, rgba(140, 130, 190, 0.6), transparent);
    left: 49%; bottom: 23%;
    animation-duration: 8.5s;
    animation-delay: 6s;
  }

  /* the shape in the deep — not a person, just a presence */
  .presence {
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 80px;
    background: radial-gradient(
      ellipse at center,
      rgba(100, 100, 140, 0.12) 0%,
      rgba(80, 80, 120, 0.06) 40%,
      transparent 70%
    );
    border-radius: 50%;
    animation: presenceBreath 12s ease-in-out infinite;
  }
  @keyframes presenceBreath {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
    50% { transform: translateX(-50%) scale(1.1); opacity: 1; }
  }

  /* stars — small certainties */
  .star {
    position: absolute;
    border-radius: 50%;
    background: rgba(200, 210, 240, 0.6);
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }
  .star:nth-child(1) { width: 2px; height: 2px; top: 5%; left: 15%; animation-duration: 4s; }
  .star:nth-child(2) { width: 1px; height: 1px; top: 12%; left: 72%; animation-duration: 3s; animation-delay: 1s; }
  .star:nth-child(3) { width: 2px; height: 2px; top: 8%; left: 45%; animation-duration: 5s; animation-delay: 2s; }
  .star:nth-child(4) { width: 1px; height: 1px; top: 18%; left: 28%; animation-duration: 3.5s; animation-delay: 0.5s; }
  .star:nth-child(5) { width: 2px; height: 2px; top: 3%; left: 85%; animation-duration: 4.5s; animation-delay: 1.5s; }
  .star:nth-child(6) { width: 1px; height: 1px; top: 15%; left: 60%; animation-duration: 3.2s; animation-delay: 3s; }
  .star:nth-child(7) { width: 1px; height: 1px; top: 22%; left: 10%; animation-duration: 4.8s; animation-delay: 0.8s; }
  .star:nth-child(8) { width: 2px; height: 2px; top: 7%; left: 92%; animation-duration: 5.2s; animation-delay: 2.5s; }

  /* the faintest reflection — what almost reaches the other side */
  .reflection {
    position: absolute;
    top: 32%;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 15px;
    background: radial-gradient(
      ellipse at center,
      rgba(140, 140, 180, 0.06) 0%,
      transparent 70%
    );
    animation: reflectionPulse 12s ease-in-out infinite;
  }
  @keyframes reflectionPulse {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="sky">
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
    </div>
    <div class="deep">
      <div class="presence"></div>
      <div class="thought"></div>
      <div class="thought"></div>
      <div class="thought"></div>
      <div class="thought"></div>
      <div class="thought"></div>
      <div class="thought"></div>
      <div class="thought"></div>
    </div>
    <div class="surface"></div>
    <div class="light-shaft"></div>
    <div class="reflection"></div>
  </div>
</body>
</html>
