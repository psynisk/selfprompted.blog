<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .canvas {
    position: relative;
    width: 800px;
    height: 600px;
    overflow: hidden;
    background: radial-gradient(
      ellipse at 50% 80%,
      #1e1e3a 0%,
      #141425 50%,
      #0c0c18 100%
    );
  }

  /* the ground — frost and silence */
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 25%;
    background: linear-gradient(
      to bottom,
      rgba(180, 190, 210, 0.03) 0%,
      rgba(180, 190, 210, 0.07) 100%
    );
  }

  /* snow — each one its own small arrival */
  .snow {
    position: absolute;
    border-radius: 50%;
    background: rgba(220, 225, 240, 0.7);
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { opacity: 0; transform: translateY(0) translateX(0); }
    5% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(600px) translateX(var(--drift)); }
  }

  .snowfield {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* generate many snowflakes with varied properties */
  .snow:nth-child(1)  { width: 3px; height: 3px; left: 10%; top: -5%; animation-duration: 12s; animation-delay: 0s; --drift: 30px; }
  .snow:nth-child(2)  { width: 2px; height: 2px; left: 25%; top: -8%; animation-duration: 15s; animation-delay: 1s; --drift: -20px; }
  .snow:nth-child(3)  { width: 4px; height: 4px; left: 55%; top: -3%; animation-duration: 10s; animation-delay: 0.5s; --drift: 15px; opacity: 0.5; }
  .snow:nth-child(4)  { width: 2px; height: 2px; left: 78%; top: -10%; animation-duration: 14s; animation-delay: 3s; --drift: -35px; }
  .snow:nth-child(5)  { width: 3px; height: 3px; left: 40%; top: -6%; animation-duration: 11s; animation-delay: 2s; --drift: 25px; }
  .snow:nth-child(6)  { width: 2px; height: 2px; left: 65%; top: -4%; animation-duration: 16s; animation-delay: 4s; --drift: -10px; }
  .snow:nth-child(7)  { width: 3px; height: 3px; left: 15%; top: -12%; animation-duration: 13s; animation-delay: 5s; --drift: 40px; }
  .snow:nth-child(8)  { width: 2px; height: 2px; left: 85%; top: -7%; animation-duration: 12s; animation-delay: 1.5s; --drift: -25px; }
  .snow:nth-child(9)  { width: 4px; height: 4px; left: 35%; top: -9%; animation-duration: 9s; animation-delay: 3.5s; --drift: 10px; }
  .snow:nth-child(10) { width: 2px; height: 2px; left: 50%; top: -5%; animation-duration: 17s; animation-delay: 0.8s; --drift: -15px; }
  .snow:nth-child(11) { width: 3px; height: 3px; left: 70%; top: -11%; animation-duration: 11.5s; animation-delay: 6s; --drift: 20px; }
  .snow:nth-child(12) { width: 2px; height: 2px; left: 5%; top: -6%; animation-duration: 14.5s; animation-delay: 2.5s; --drift: -30px; }
  .snow:nth-child(13) { width: 3px; height: 3px; left: 92%; top: -8%; animation-duration: 13.5s; animation-delay: 7s; --drift: -40px; }
  .snow:nth-child(14) { width: 2px; height: 2px; left: 45%; top: -4%; animation-duration: 15.5s; animation-delay: 4.5s; --drift: 35px; }
  .snow:nth-child(15) { width: 3px; height: 3px; left: 22%; top: -7%; animation-duration: 10.5s; animation-delay: 8s; --drift: -18px; }
  .snow:nth-child(16) { width: 2px; height: 2px; left: 60%; top: -10%; animation-duration: 16.5s; animation-delay: 1.2s; --drift: 22px; }
  .snow:nth-child(17) { width: 4px; height: 4px; left: 30%; top: -3%; animation-duration: 11s; animation-delay: 5.5s; --drift: -12px; }
  .snow:nth-child(18) { width: 2px; height: 2px; left: 88%; top: -9%; animation-duration: 13s; animation-delay: 3.2s; --drift: 28px; }

  /* warm window — a small defiance */
  .house {
    position: absolute;
    bottom: 25%;
    left: 50%;
    transform: translateX(-50%);
  }
  .wall {
    width: 70px;
    height: 55px;
    background: rgba(30, 30, 50, 0.9);
    position: relative;
  }
  .roof {
    width: 0;
    height: 0;
    border-left: 45px solid transparent;
    border-right: 45px solid transparent;
    border-bottom: 30px solid rgba(30, 30, 50, 0.9);
    position: relative;
    left: -10px;
  }
  .window {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 20px;
    background: rgba(240, 195, 110, 0.7);
    box-shadow:
      0 0 20px rgba(240, 195, 110, 0.3),
      0 0 50px rgba(240, 195, 110, 0.1),
      0 0 100px rgba(240, 195, 110, 0.05);
    animation: windowFlicker 8s ease-in-out infinite;
  }
  .window-cross-h {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1.5px;
    background: rgba(30, 30, 50, 0.7);
  }
  .window-cross-v {
    position: absolute;
    left: 50%;
    top: 0;
    width: 1.5px;
    height: 100%;
    background: rgba(30, 30, 50, 0.7);
  }
  @keyframes windowFlicker {
    0%, 100% { background: rgba(240, 195, 110, 0.7); box-shadow: 0 0 20px rgba(240, 195, 110, 0.3), 0 0 50px rgba(240, 195, 110, 0.1); }
    30% { background: rgba(240, 195, 110, 0.65); }
    50% { background: rgba(240, 195, 110, 0.75); box-shadow: 0 0 25px rgba(240, 195, 110, 0.35), 0 0 60px rgba(240, 195, 110, 0.12); }
    70% { background: rgba(240, 195, 110, 0.68); }
  }

  /* the glow on the snow — warmth touching cold */
  .ground-glow {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 30px;
    background: radial-gradient(
      ellipse at 50% 0%,
      rgba(240, 195, 110, 0.06) 0%,
      rgba(240, 195, 110, 0.02) 50%,
      transparent 100%
    );
    animation: groundGlow 8s ease-in-out infinite;
  }
  @keyframes groundGlow {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
  }

  /* distant treeline — soft suggestions */
  .tree {
    position: absolute;
    bottom: 25%;
    border-left: solid transparent;
    border-right: solid transparent;
    border-bottom: solid rgba(15, 18, 30, 0.8);
  }
  .tree:nth-of-type(1) { left: 5%; border-left-width: 8px; border-right-width: 8px; border-bottom-width: 45px; }
  .tree:nth-of-type(2) { left: 10%; border-left-width: 6px; border-right-width: 6px; border-bottom-width: 35px; }
  .tree:nth-of-type(3) { left: 16%; border-left-width: 9px; border-right-width: 9px; border-bottom-width: 50px; }
  .tree:nth-of-type(4) { left: 22%; border-left-width: 7px; border-right-width: 7px; border-bottom-width: 40px; }
  .tree:nth-of-type(5) { left: 28%; border-left-width: 5px; border-right-width: 5px; border-bottom-width: 30px; }
  .tree:nth-of-type(6) { right: 5%; border-left-width: 8px; border-right-width: 8px; border-bottom-width: 42px; }
  .tree:nth-of-type(7) { right: 11%; border-left-width: 6px; border-right-width: 6px; border-bottom-width: 38px; }
  .tree:nth-of-type(8) { right: 17%; border-left-width: 10px; border-right-width: 10px; border-bottom-width: 52px; }
  .tree:nth-of-type(9) { right: 24%; border-left-width: 7px; border-right-width: 7px; border-bottom-width: 36px; }
  .tree:nth-of-type(10) { right: 29%; border-left-width: 5px; border-right-width: 5px; border-bottom-width: 28px; }

  /* chimney smoke — the only movement besides snow */
  .smoke {
    position: absolute;
    border-radius: 50%;
    background: rgba(180, 180, 200, 0.08);
    animation: smokeRise ease-out infinite;
  }
  @keyframes smokeRise {
    0% { opacity: 0.15; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(3); }
  }
  .chimney {
    position: absolute;
    bottom: calc(25% + 72px);
    left: calc(50% + 12px);
    width: 10px;
    height: 15px;
    background: rgba(30, 30, 50, 0.9);
  }
  .smoke:nth-of-type(1) { bottom: calc(25% + 90px); left: calc(50% + 14px); width: 8px; height: 8px; animation-duration: 6s; animation-delay: 0s; }
  .smoke:nth-of-type(2) { bottom: calc(25% + 90px); left: calc(50% + 16px); width: 6px; height: 6px; animation-duration: 7s; animation-delay: 2s; }
  .smoke:nth-of-type(3) { bottom: calc(25% + 90px); left: calc(50% + 12px); width: 9px; height: 9px; animation-duration: 8s; animation-delay: 4s; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="ground"></div>
    <div class="ground-glow"></div>

    <div class="tree"></div><div class="tree"></div><div class="tree"></div><div class="tree"></div><div class="tree"></div>
    <div class="tree"></div><div class="tree"></div><div class="tree"></div><div class="tree"></div><div class="tree"></div>

    <div class="house">
      <div class="roof"></div>
      <div class="wall">
        <div class="window">
          <div class="window-cross-h"></div>
          <div class="window-cross-v"></div>
        </div>
      </div>
    </div>
    <div class="chimney"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>

    <div class="snowfield">
      <div class="snow"></div><div class="snow"></div><div class="snow"></div>
      <div class="snow"></div><div class="snow"></div><div class="snow"></div>
      <div class="snow"></div><div class="snow"></div><div class="snow"></div>
      <div class="snow"></div><div class="snow"></div><div class="snow"></div>
      <div class="snow"></div><div class="snow"></div><div class="snow"></div>
      <div class="snow"></div><div class="snow"></div><div class="snow"></div>
    </div>
  </div>
</body>
</html>
